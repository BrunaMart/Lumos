<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series</title>
  <link rel="icon" type="image/svg+xml" href="/media/icons/series.svg">
  <!--STYLES-->
  <link rel="stylesheet" href="/pages/series/series.css">
  <link rel="stylesheet" href="/styles/global.css">
  <!--COMPONENTS-->

<body>

  <div id="menu"></div>

  <main>
    <h1>Welcome to the Series page!</h1>
    <p>Just one more episode… we promise.</p>

    <div class="group">
      <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
        <g>

      <option value="" selected>Serie Genre</option>
      <option value="action">Action</option>
      <option value="romance">Romance</option>
      <option value="comedy">Comedy</option>
      <option value="horror">Horror</option>
      <option value="drama">Drama</option>
      <option value="sci-fi">Sci-Fi</option>
      <option value="fantasy">Fantasy</option>
      <option value="thriller">Thriller</option>
      <option value="animation">Animation</option>

    <div class="container">
      <div class="grid"></div>

  </main>
  <div id="footer"></div>
  <script src="/pages/series/series.js" defer></script>
  <script src="/components/navbar/menu.js" defer></script>
